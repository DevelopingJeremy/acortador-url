<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acortador de URL</title>
    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <h1>Bienvenido a tu acortador de URLs</h1>

    <input type="text">
    <button type="submit">Acortar URL</button>

    <script>
        document.write(window.location.pathname);

        // Obtiene todo el path después del dominio
        const path = window.location.pathname;

        // path = "/acortador/aB3dE"
        // Dividimos por "/" y tomamos el último segmento
        const id = path.split("/").pop();

        console.log(id); // "aB3dE"

    </script>
</body>
</html>
