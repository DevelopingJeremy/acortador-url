<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acortador de URLs</title>
    <link rel="stylesheet" href="public/style.css">
</head>

<body>

    <script src="public/redireccion.js"></script>

    <header class="main-header">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="12" fill="#4a90e2"/><path d="M7 12h10M12 7v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <h1>Links y QR</h1>
        <p class="subtitle">Acorta links o crea codigos QR directos para compartirlos facilmente.</p>
    </header>

    <section class="container pro">
        <div class="mode-selector" role="group" aria-label="Seleccionar accion">
            <label>
                <input type="radio" name="modo" value="short" checked onchange="cambiarModo();">
                <span>Acortar URL</span>
            </label>
            <label>
                <input type="radio" name="modo" value="qr" onchange="cambiarModo();">
                <span>Crear QR</span>
            </label>
        </div>

        <form class="shorten-form" autocomplete="off" onsubmit="event.preventDefault(); procesarFormulario();">
            <input id="urlInput" type="text" placeholder="Pega tu link aquí, por ejemplo: https://www.google.com" required>
            <div id="qrOptions" class="qr-options">
                <label for="logoInput">Foto para el centro del QR</label>
                <input id="logoInput" type="file" accept="image/png,image/jpeg,image/webp">
            </div>
            <button id="submitButton" type="submit">Acortar Link</button>
        </form>

        <div id="resultado" class="result">
            <div class="success-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="12" fill="#2ecc71"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <p id="successMsg" class="success-msg">Tu link se ha acortado con exito.</p>
            <div class="links">
                <p>Link original: <a id="linkOriginal" href="#" target="_blank"></a></p>
                <p id="shortLinkRow">Link acortado: <a id="linkCorto" href="#" target="_blank"></a></p>
                <div id="qrPreview" class="qr-preview">
                    <img id="qrImage" alt="Codigo QR generado">
                </div>
            </div>
            <div class="buttons">
                <button onclick="crearNuevo()">Crear nuevo</button>
                <button id="copyButton" class="copy" onclick="copiar()">Copiar Link</button>
                <button id="downloadButton" class="download" onclick="descargarQr()">Descargar QR</button>
            </div>
        </div>
    </section>

    <script src="public/main.js"></script>
</body>

</html>
